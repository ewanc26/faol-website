<!-- ── App Shell ───────────────────────────────────────────── -->
<!-- SvelteKit HTML shell. %sveltekit.head% and %sveltekit.body% are -->
<!-- replaced by the framework. data-sveltekit-preload-data="tap" -->
<!-- preloads page data on hover/tap for instant navigation. -->

<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
